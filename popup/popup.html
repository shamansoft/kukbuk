<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MyKukBuk</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="container">
            <header>
                <img
                    src="../icons/icon48.png"
                    alt="MyKukBuk Logo"
                    class="logo"
                />
                <h1>MyKukBuk</h1>
            </header>

            <!-- Minimal Status Section (EXT-12-a: for quick states) -->
            <section id="minimal-status-section" style="display: none">
                <div class="minimal-status">
                    <div class="minimal-status-icon"></div>
                    <p id="minimal-status-text">checking...</p>
                </div>
            </section>

            <!-- Success Section with Drive Link -->
            <section id="success-section" style="display: none">
                <div class="success-message">
                    <div class="success-icon">✓</div>
                    <p class="success-text">Saved in</p>
                    <a id="drive-link" href="#" target="_blank" class="drive-link">your drive</a>
                </div>
            </section>

            <!-- Login Section (Hidden by default when logged in) -->
            <section id="login-section">
                <p class="welcome-text">Save recipes to your Google Drive</p>

                <!-- Email/Password Form -->
                <form id="email-login-form">
                    <input
                        type="email"
                        id="email-input"
                        placeholder="Email"
                        autocomplete="email"
                        required
                    />
                    <input
                        type="password"
                        id="password-input"
                        placeholder="Password"
                        autocomplete="current-password"
                        required
                    />
                    <button type="submit" class="btn primary">Sign In</button>
                </form>
                <div class="divider"><span>or</span></div>
                <div class="oauth-providers">
                    <button id="google-signin-btn" class="btn secondary oauth-btn" type="button">
                        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                        </svg>
                        Continue with Google
                    </button>
                </div>
            </section>

            <!-- Logged In Section (Hidden by default when logged out) -->
            <section id="main-section" style="display: none">
                <div class="user-info">
                    <img
                        src="../icons/user.png"
                        alt="User"
                        id="user-avatar"
                        class="avatar"
                    />
                    <span id="user-email">user@example.com</span>
                </div>

                <button id="save-recipe-button" class="btn primary">
                    Save This Recipe
                </button>

                <div class="action-buttons">
                    <button id="settings-button" class="btn secondary">
                        Settings
                    </button>
                    <button id="logout-button" class="btn secondary">
                        Log Out
                    </button>
                </div>
            </section>

            <!-- Status Messages -->
            <div id="status-container">
                <p id="status-message"></p>
            </div>
        </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
